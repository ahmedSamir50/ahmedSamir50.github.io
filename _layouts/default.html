<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <meta name="description"
    content="Ahmed Samir – Lead Full Stack Engineer (.NET | Angular | Mobile Hybrid). 9+ years delivering mission-critical enterprise systems for GCC/MENA markets." />
  <meta name="author" content="Ahmed Samir Abd El Aal" />
  <meta property="og:title" content="Ahmed Samir | Lead Full Stack Engineer" />
  <meta property="og:url" content="https://ahmedsamir50.github.io" />
  <title>{{ page.title | default: "Ahmed Samir | Lead Full Stack Engineer" }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Fira+Code:wght@400;500&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}" />
  <link rel="icon" type="image/x-icon" href="{{ '/assets/favicon.ico' | relative_url }}" />
</head>

<body class="bg-navy-950 text-slate-100 font-inter antialiased">

  <!-- NAV -->
  <nav id="navbar" class="fixed top-0 left-0 right-0 z-50 transition-all duration-300">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <a href="{{ '/' | relative_url }}#hero" class="flex items-center gap-2 group">
          <div
            class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-violet-600 flex items-center justify-center text-white font-bold text-sm group-hover:scale-110 transition-transform">
            AS</div>
          <span class="font-semibold text-slate-200 text-sm hidden sm:block">Ahmed Samir</span>
        </a>
        <div class="hidden md:flex items-center gap-1">
          <a href="{{ '/' | relative_url }}#about"
            class="nav-link px-3 py-2 text-sm text-slate-400 hover:text-blue-400 transition-colors rounded-lg hover:bg-white/5">About</a>
          <a href="{{ '/' | relative_url }}#experience"
            class="nav-link px-3 py-2 text-sm text-slate-400 hover:text-blue-400 transition-colors rounded-lg hover:bg-white/5">Experience</a>
          <a href="{{ '/' | relative_url }}#skills"
            class="nav-link px-3 py-2 text-sm text-slate-400 hover:text-blue-400 transition-colors rounded-lg hover:bg-white/5">Skills</a>
          <a href="{{ '/' | relative_url }}#projects"
            class="nav-link px-3 py-2 text-sm text-slate-400 hover:text-blue-400 transition-colors rounded-lg hover:bg-white/5">Projects</a>
          <a href="{{ '/' | relative_url }}#certificates"
            class="nav-link px-3 py-2 text-sm text-slate-400 hover:text-blue-400 transition-colors rounded-lg hover:bg-white/5">Certificates</a>
          <a href="{{ '/' | relative_url }}#contact"
            class="nav-link px-3 py-2 text-sm text-slate-400 hover:text-blue-400 transition-colors rounded-lg hover:bg-white/5">Contact</a>
        </div>
        <div class="flex items-center gap-3">
          <a href="https://drive.google.com/file/d/1B9kyD2vSlzJB9bRIN5AzTpw4DzPb5KyI/view?usp=sharing" target="_blank"
            class="hidden sm:flex items-center gap-2 px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium rounded-lg transition-all hover:shadow-lg hover:shadow-blue-500/25">
            <i data-lucide="external-link" class="w-4 h-4"></i>CV
          </a>
          <button id="mobile-menu-btn"
            class="md:hidden p-2 text-slate-400 hover:text-white rounded-lg hover:bg-white/5">
            <i data-lucide="menu" class="w-5 h-5"></i>
          </button>
        </div>
      </div>
    </div>
    <div id="mobile-menu" class="hidden md:hidden border-t border-white/10 bg-navy-950/95 backdrop-blur-xl">
      <div class="px-4 py-3 space-y-1">
        <a href="{{ '/' | relative_url }}#about"
          class="block px-3 py-2 text-sm text-slate-400 hover:text-blue-400 hover:bg-white/5 rounded-lg">About</a>
        <a href="{{ '/' | relative_url }}#experience"
          class="block px-3 py-2 text-sm text-slate-400 hover:text-blue-400 hover:bg-white/5 rounded-lg">Experience</a>
        <a href="{{ '/' | relative_url }}#skills"
          class="block px-3 py-2 text-sm text-slate-400 hover:text-blue-400 hover:bg-white/5 rounded-lg">Skills</a>
        <a href="{{ '/' | relative_url }}#projects"
          class="block px-3 py-2 text-sm text-slate-400 hover:text-blue-400 hover:bg-white/5 rounded-lg">Projects</a>
        <a href="{{ '/' | relative_url }}#certificates"
          class="block px-3 py-2 text-sm text-slate-400 hover:text-blue-400 hover:bg-white/5 rounded-lg">Certificates</a>
        <a href="{{ '/' | relative_url }}#contact"
          class="block px-3 py-2 text-sm text-slate-400 hover:text-blue-400 hover:bg-white/5 rounded-lg">Contact</a>
        <a href="https://drive.google.com/file/d/1B9kyD2vSlzJB9bRIN5AzTpw4DzPb5KyI/view?usp=sharing" target="_blank"
          class="flex items-center gap-2 px-3 py-2 bg-blue-600/20 text-blue-400 text-sm rounded-lg"><i
            data-lucide="external-link" class="w-4 h-4"></i>Download CV</a>
      </div>
    </div>
  </nav>

  {{ content }}

  <!-- FOOTER -->
  <footer class="border-t border-white/5 py-8">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col sm:flex-row items-center justify-between gap-4">
      <div class="flex items-center gap-2">
        <div
          class="w-6 h-6 rounded-md bg-gradient-to-br from-blue-500 to-violet-600 flex items-center justify-center text-white font-bold text-xs">
          AS</div>
        <span class="text-slate-500 text-sm">Ahmed Samir Abd El Aal</span>
      </div>
      <p class="text-slate-600 text-xs font-mono">© <span id="current-year">2026</span> · Engineered in Cairo, Egypt.
      </p>
      <div class="flex items-center gap-3">
        <a href="https://github.com/ahmedSamir50" target="_blank" rel="noopener"
          class="text-slate-600 hover:text-slate-400 transition-colors text-xs">GitHub</a>
        <a href="http://www.linkedin.com/in/ahmed-samir-423875106" target="_blank" rel="noopener"
          class="text-slate-600 hover:text-slate-400 transition-colors text-xs">LinkedIn</a>
        <a href="mailto:ahmed.samir.abdelaal@gmail.com"
          class="text-slate-600 hover:text-slate-400 transition-colors text-xs">Email</a>
      </div>
    </div>
  </footer>

  <!-- Scroll to Top -->
  <button id="scroll-top" aria-label="Scroll to top">
    <i data-lucide="chevron-up" class="w-5 h-5"></i>
  </button>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script>lucide.createIcons();</script>
  <script src="{{ '/js/script.js' | relative_url }}"></script>
</body>
</html>
